<!DOCTYPE html>
<html lang="en" class="w-100 h-100">
  <head>
    <meta charset="utf-8">
    <title>{% if page.metatitle %}{{ page.metatitle }}{% elsif page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    {% if site.description != "" %}<meta name="description" content="{{ site.description }}">{% endif %}
    <meta name="viewport" content="width=device-width">

    {% if page.redirect %}<meta http-equiv="refresh" content="0; url={{ page.redirect }}">{% endif %}

    <link href="https://fonts.googleapis.com/css?family=Libre+Franklin:400,400italic,600,700,300,800|IBM+Plex+Mono|Inconsolata:400,700" rel="stylesheet" type="text/css">

    <link rel="stylesheet" href="/assets/css/tachyons.min.css">
    <link rel="stylesheet" href="/assets/css/hamburgers.css">
    <link rel="stylesheet" href="/assets/css/all.css">
    <link rel="stylesheet" href="/assets/css/mobile.css">

    <link rel="icon" href="/assets/img/favicon.png">
    <link rel="alternate" type="application/rss+xml" title="RSS feed for {{ site.title }}" href="/feed.xml">

    <!-- jQuery is required by nav.html / streak.html / feather.
         CDN is fine: the Neocities CSP allows script-src * (it blocks fetch, not scripts). -->
    <script src="https://code.jquery.com/jquery-1.10.2.min.js" type="text/javascript"></script>
    <script src="/assets/js/feather.min.js" type="text/javascript"></script>
    <script src="/assets/js/jquery-ui.min.js" type="text/javascript"></script>

    <meta property="og:type" content="article">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <meta property="og:title" content="{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title }}{% endif %}">
    <meta property="og:description" content="{% if page.subtitle %}{{ page.subtitle | escape }}{% else %}{{ page.content | truncatewords: 20 | strip_html | escape }}{% endif %}">
    {% if page.og %}
    <meta property="og:image" content="{{ page.og }}">
    <meta property="og:image:width" content="600">
    <meta property="og:image:height" content="315">
    {% endif %}

    <meta name="twitter:card" content="{% if page.og %}summary_large_image{% else %}summary{% endif %}">
    <meta name="twitter:title" content="{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title }}{% endif %}">
    <meta name="twitter:description" content="{% if page.subtitle %}{{ page.subtitle | escape }}{% else %}{{ page.content | truncatewords: 20 | strip_html | escape }}{% endif %}">
    {% if page.og %}<meta name="twitter:image" content="{{ page.og }}">{% endif %}
  </head>

  <body class="ph0-l center">
